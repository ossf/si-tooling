---
name: CI Checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: v2/go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@c592b80ac95af7adaeb67d75125d105ec7b33124
        with:
          version: v2.1
          working-directory: v2
      - name: run tests
        run: make covcheck
